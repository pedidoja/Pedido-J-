<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEDIDO JÁ - VERSÃO FORÇADA</title>
    <style>
        body { font-family: sans-serif; background: #ece5dd; padding: 10px; margin: 0; }
        .container { background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #075e54; margin-top: 0; }
        label { display: block; font-weight: bold; font-size: 13px; margin-top: 15px; color: #128c7e; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-zap { background: #25d366; color: white; border: none; width: 100%; padding: 20px; margin-top: 25px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>PEDIDO JÁ ✅</h2>
    
    <label>NOME DO CLIENTE</label>
    <input type="text" id="cli">
    
    <label>DETALHES DE ENTREGA (RUA, Nº, BAIRRO, CIDADE)</label>
    <textarea id="entrega" rows="3" placeholder="Digite o endereço completo aqui..."></textarea>

    <label>PRODUTOS E VALORES</label>
    <textarea id="prod" rows="4" placeholder="Ex: 1 Cama Box - 500,00"></textarea>

    <label>TOTAL GERAL (R$)</label>
    <input type="text" id="total">

    <label>VENDEDOR</label>
    <input type="text" id="vend">

    <button class="btn-zap" onclick="enviarTudo()">ENVIAR PARA WHATSAPP</button>
</div>

<script>
    function enviarTudo() {
        // Pega os valores ignorando erros de campo vazio
        var n = document.getElementById('cli').value.trim();
        var e = document.getElementById('entrega').value.trim();
        var p = document.getElementById('prod').value.trim();
        var t = document.getElementById('total').value.trim();
        var v = document.getElementById('vend').value.trim();

        // Monta a mensagem sem usar quebras de linha complexas que o telemóvel bloqueia
        var texto = "*PEDIDO JÁ*\n" +
                    "*CLIENTE:* " + n + "\n" +
                    "*ENTREGA:* " + e + "\n" +
                    "*ITENS:* " + p + "\n" +
                    "*TOTAL:* R$ " + t + "\n" +
                    "*VENDEDOR:* " + v;

        // Codificação simples
        var msgFinal = encodeURIComponent(texto);
        
        // Usa o link oficial wa.me que é o mais leve para telemóveis
        window.location.href = "https://wa.me/?text=" + msgFinal;
    }
</script>

</body>
</html>
