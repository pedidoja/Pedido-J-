<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedido Já</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body { font-family: sans-serif; background: #e9ecef; margin: 0; padding: 10px; }
        
        input, textarea, select { 
            text-transform: uppercase; 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            font-size: 16px; box-sizing: border-box; background: #fff; height: 48px; 
        }

        .container { max-width: 700px; margin: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: 20px; padding-bottom: 10px; font-weight: bold; font-size: 22px; }
        .campo { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; margin-bottom: 3px; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .btn-acao { 
            width: 100%; height: 55px; border: none; border-radius: 8px; font-weight: bold; 
            cursor: pointer; font-size: 16px; text-transform: uppercase; color: white; 
            display: flex; align-items: center; justify-content: center; background: #1a73e8;
        }

        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: fixed; left: 0; top: 0; width: 100%; height: 100%;
                display: flex !important; justify-content: space-between; 
                background: white; padding: 0; margin: 0;
            }
            .via { 
                width: 48%; height: 95%; border: 1px dashed #000; 
                padding: 10px; box-sizing: border-box;
                display: flex; flex-direction: column; font-size: 10px;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">PEDIDO JÁ</div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Data Pedido</label><input type="date" id="i-data"></div>
        <div class="campo" style="flex: 1;"><label>Entrega</label><input type="date" id="i-entrega"></div>
    </div>
    
    <div class="campo"><label>Cliente</label><input type="text" id="i-cliente"></div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 3;"><label>Rua</label><input type="text" id="i-rua"></div>
        <div class="campo" style="flex: 1;"><label>Nº</label><input type="text" id="i-num"></div>
    </div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Bairro</label><input type="text" id="i-bairro"></div>
        <div class="campo" style="flex: 1;"><label>Cidade</label><input type="text" id="i-cidade"></div>
    </div>

    <div class="campo"><label>Ponto de Referência</label><textarea id="i-ref"></textarea></div>
    
    <div id="lista-mercadorias">
        <label>Mercadorias</label>
        <div class="linha-mercadoria" style="display: flex; gap: 5px; margin-bottom: 8px;">
            <textarea placeholder="ITEM" style="flex: 3;" class="m-desc"></textarea>
            <input type="text" placeholder="UN" style="flex: 0.8;" class="m-un">
            <input type="number" step="0.01" placeholder="0,00" style="flex: 1.5;" class="m-val" oninput="calcularTotais()">
        </div>
    </div>
    <button onclick="adicionarLinha()" style="width:100%; margin-bottom:15px; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; padding:8px; cursor:pointer;">+ ADICIONAR ITEM</button>

    <div style="display: flex; gap: 5px; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        <div class="campo" style="flex: 1;"><label>Subtotal</label><input type="number" id="i-v-merc" readonly></div>
        <div class="campo" style="flex: 1;"><label>Frete</label><input type="number" step="0.01" id="i-v-frete" oninput="calcularTotais()"></div>
        <div class="campo" style="flex: 1;"><label>Total</label><input type="number" id="i-v-total" readonly style="font-weight: bold; color: #1a73e8;"></div>
    </div>

    <div class="campo" style="margin-top:10px;"><label>Vendedor</label><input type="text" id="i-vend" oninput="salvarDadosFixos()"></div>

    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
        <button class="btn-acao" onclick="gerarPDF()">Gerar PDF / Imprimir</button>
        <button class="btn-acao" style="background: #25d366;" onclick="enviarWhatsApp()">WhatsApp Completo</button>
        <button class="btn-acao" style="background: #6c757d;" onclick="if(confirm('Limpar tudo?')) location.reload()">Novo Pedido</button>
    </div>
</div>

<div id="print-area"></div>

<script>
    window.onload = function() {
        document.getElementById('i-data').value = new Date().toISOString().substring(0, 10);
        document.getElementById('i-vend').value = localStorage.getItem('vendedor') || "";
    };

    function salvarDadosFixos() {
        localStorage.setItem('vendedor', document.getElementById('i-vend').value.toUpperCase());
    }

    function adicionarLinha() {
        const div = document.createElement('div');
        div.className = 'linha-mercadoria';
        div.style.display = "flex"; div.style.gap = "5px"; div.style.marginBottom = "8px";
        div.innerHTML = `<textarea placeholder="ITEM" style="flex:3;" class="m-desc"></textarea><input type="text" placeholder="UN" style="flex:0.8;" class="m-un"><input type="number" step="0.01" placeholder="0,00" style="flex:1.5;" class="m-val" oninput="calcularTotais()">`;
        document.getElementById('lista-mercadorias').appendChild(div);
    }

    function calcularTotais() {
        let somaMerc = 0;
        document.querySelectorAll('.m-val').forEach(el => somaMerc += parseFloat(el.value) || 0);
        const frete = parseFloat(document.getElementById('i-v-frete').value) || 0;
        document.getElementById('i-v-merc').value = somaMerc.toFixed(2);
        document.getElementById('i-v-total').value = (somaMerc + frete).toFixed(2);
    }

    function gerarPDF() {
        const formatarData = (data) => data ? data.split('-').reverse().join('/') : "";
        const f = (id) => document.getElementById(id).value.toUpperCase();
        
        let mercsHTML = "";
        document.querySelectorAll('.m-desc').forEach((el, i) => {
            const val = parseFloat(document.querySelectorAll('.m-val')[i].value) || 0;
            if(el.value || val > 0) {
                mercsHTML += `<div style="display:flex; margin-bottom:2px; border-bottom:0.5px solid #eee;">
                    <div style="flex:3">${el.value.toUpperCase()}</div>
                    <div style="flex:0.6; text-align:center">${document.querySelectorAll('.m-un')[i].value.toUpperCase()}</div>
                    <div style="flex:1.2; text-align:right">R$ ${val.toFixed(2)}</div>
                </div>`;
            }
        });

        const viaConteudo = `
            <div class="via">
                <div style="text-align:center; font-weight:bold; font-size:16px; border-bottom:2px solid #000; margin-bottom:10px;">PEDIDO JÁ</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>DATA: ${formatarData(document.getElementById('i-data').value)}</span>
                    <span>ENTREGA: ${formatarData(document.getElementById('i-entrega').value)}</span>
                </div>
                <div style="margin-bottom:3px;"><b>CLIENTE:</b> ${f('i-cliente')}</div>
                <div style="margin-bottom:3px;"><b>ENDEREÇO:</b> ${f('i-rua')}, ${f('i-num')}</div>
                <div style="margin-bottom:3px;"><b>BAIRRO:</b> ${f('i-bairro')} - ${f('i-cidade')}</div>
                <div style="margin-bottom:10px;"><b>REF:</b> ${f('i-ref')}</div>
                <div style="border-bottom:1px solid #000; font-weight:bold; display:flex; font-size:10px; margin-bottom:5px;">
                    <div style="flex:3">ITEM</div><div style="flex:0.6; text-align:center">UN</div><div style="flex:1.2; text-align:right">VALOR</div>
                </div>
                <div style="flex-grow:1;">${mercsHTML}</div>
                <div style="border-top:1px solid #000; padding-top:5px; margin-top:10px;">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:12px;">
                        <span>TOTAL DO PEDIDO:</span><span>R$ ${document.getElementById('i-v-total').value}</span>
                    </div>
                </div>
                <div style="margin-top:20px; border-top:1px solid #ccc; padding-top:5px;"><b>VENDEDOR:</b> ${f('i-vend')}</div>
            </div>`;

        document.getElementById('print-area').innerHTML = viaConteudo + viaConteudo;
        window.print();
    }

    function enviarWhatsApp() {
        const formatarData = (data) => data ? data.split('-').reverse().join('/') : "";
        const f = (id) => document.getElementById(id).value.toUpperCase();
        
        let listaItens = "";
        document.querySelectorAll('.m-desc').forEach((el, i) => {
            const desc = el.value.toUpperCase();
            const un = document.querySelectorAll('.m-un')[i].value.toUpperCase();
            const val = parseFloat(document.querySelectorAll('.m-val')[i].value) || 0;
            if(desc) {
                listaItens += `• ${desc} (${un}) - R$ ${val.toFixed(2)}\n`;
            }
        });

        let mensagem = `*PEDIDO JÁ*\n`;
        mensagem += `----------------------------\n`;
        mensagem += `*DATA:* ${formatarData(document.getElementById('i-data').value)}\n`;
        mensagem += `*ENTREGA:* ${formatarData(document.getElementById('i-entrega').value)}\n\n`;
        mensagem += `*CLIENTE:* ${f('i-cliente')}\n`;
        mensagem += `*ENDEREÇO:* ${f('i-rua')}, ${f('i-num')}\n`;
        mensagem += `*BAIRRO:* ${f('i-bairro')} - ${f('i-cidade')}\n`;
        mensagem += `*REF:* ${f('i-ref')}\n\n`;
        mensagem += `*ITENS:*\n${listaItens}\n`;
        mensagem += `*SUBTOTAL:* R$ ${document.getElementById('i-v-merc').value}\n`;
        mensagem += `*FRETE:* R$ ${document.getElementById('i-v-frete').value || '0.00'}\n`;
        mensagem += `*TOTAL GERAL: R$ ${document.getElementById('i-v-total').value}*\n\n`;
        mensagem += `*VENDEDOR:* ${f('i-vend')}`;

        const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
