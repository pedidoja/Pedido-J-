<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedido Já</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1532/1532674.png">

    <style>
        /* CSS ORIGINAL DO SEU APP */
        body { font-family: sans-serif; background: #e9ecef; margin: 0; padding: 10px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; display: none; }
        .header { text-align: center; color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: 20px; padding-bottom: 10px; font-weight: bold; font-size: 22px; }
        .campo { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; margin-bottom: 3px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; background: #fff; height: 48px; text-transform: uppercase; color: #000; }
        textarea { height: auto; min-height: 48px; resize: vertical; font-family: sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .btn-add { background: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-bottom: 15px; text-transform: uppercase; width: 100% !important; display: block; }
        .area-botoes { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-acao { width: 100%; height: 55px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; background: #28a745; }
        #detalhe-pagamento { background: #fdf2f2; border: 1px solid #ffc1c1; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 14px; line-height: 1.6; color: #333; font-weight: bold; text-transform: uppercase; font-family: monospace; }
        
        /* ESTILOS DE LOGIN E RODAPÉ */
        #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a73e8; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .box-login { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        .footer-contato { text-align: center; margin-top: 25px; padding-bottom: 10px; font-size: 11px; color: #888; }
        .footer-contato a { color: #888; text-decoration: none; }

        @media print {
            @page { size: landscape; margin: 8mm; }
            .no-print { display: none !important; }
            #print-area { display: flex !important; width: 100%; justify-content: space-between; }
            .via { width: 47%; border: 1px dashed #000; padding: 10px; font-size: 12px; height: 175mm; }
        }
    </style>
</head>
<body>

<div id="tela-login">
    <div class="box-login">
        <h2 style="color: #1a73e8; margin-bottom: 5px;">PEDIDO JÁ</h2>
        <p id="msg-status" style="font-size: 12px; color: #666; margin-bottom: 20px;">Carregando sistema...</p>
        <div id="form-auth" style="display:none;">
            <input type="email" id="log-email" placeholder="E-mail" style="text-transform: none;">
            <input type="password" id="log-senha" placeholder="Senha" style="text-transform: none;">
            <button onclick="window.fazerLogin()" class="btn-acao" style="background: #1a73e8;">ENTRAR</button>
            <button onclick="window.criarConta()" style="background:none; border:none; color:#1a73e8; margin-top:15px; font-weight:bold; cursor:pointer; font-size:12px;">CRIAR CONTA (15 DIAS GRÁTIS)</button>
        </div>
    </div>
</div>

<div class="container no-print" id="app-conteudo">
    <div class="header">PEDIDO JÁ</div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Data Pedido</label><input type="date" id="i-data"></div>
        <div class="campo" style="flex: 1;"><label>Entrega</label><input type="date" id="i-entrega"></div>
    </div>

    <div class="campo"><label>Cliente</label><input type="text" id="i-cliente"></div>

    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 3;"><label>Rua</label><input type="text" id="i-rua"></div>
        <div class="campo" style="flex: 1;"><label>Nº</label><input type="text" id="i-num"></div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Bairro</label><input type="text" id="i-bairro"></div>
        <div class="campo" style="flex: 1;"><label>Cidade</label><input type="text" id="i-cidade"></div>
    </div>

    <div class="campo"><label>Ponto de Referência</label><textarea id="i-ref"></textarea></div>

    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Telefone</label><input type="tel" id="i-tel"></div>
        <div class="campo" style="flex: 1.5;"><label>Obs (Breve)</label><textarea id="i-obs-breve"></textarea></div>
    </div>

    <div id="lista-mercadorias">
        <label>Mercadorias</label>
        <div class="linha-mercadoria" style="display: flex; gap: 5px; margin-bottom: 8px;">
            <textarea placeholder="Item" style="flex: 3;" class="m-desc"></textarea>
            <input type="text" placeholder="Qtd" style="flex: 0.8;" class="m-un" oninput="calcularTotais()">
            <input type="number" step="0.01" placeholder="R$ Un" style="flex: 1.5;" class="m-val" oninput="calcularTotais()">
        </div>
    </div>
    
    <button type="button" class="btn-add" onclick="adicionarLinha()">+ ADICIONAR ITEM</button>
    
    <div style="display: flex; gap: 5px; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; flex-wrap: wrap;">
        <div class="campo" style="flex: 1; min-width: 80px;"><label>Subtotal</label><input type="number" id="i-v-merc" readonly></div>
        <div class="campo" style="flex: 1; min-width: 80px;"><label>Frete</label><input type="number" step="0.01" id="i-v-frete" oninput="calcularTotais()"></div>
        <div class="campo" style="flex: 1; min-width: 80px;"><label>Desconto</label><input type="number" step="0.01" id="i-v-desc" oninput="calcularTotais()" style="color: #d32f2f;"></div>
        <div class="campo" style="flex: 1; min-width: 100px;"><label>Total</label><input type="number" id="i-v-total" readonly style="font-weight: bold; color: #1a73e8;"></div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div class="campo" style="flex: 1;"><label>Pagamento</label><select id="i-pagamento" onchange="alternarCartao()"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão">Cartão</option></select></div>
        <div class="campo" id="box-tipo-cartao" style="flex: 1; display: none;"><label>Tipo</label><select id="i-tipo-cartao" onchange="alternarCartao()"><option value="Credito">Crédito</option><option value="Debito">Débito</option></select></div>
    </div>

    <div id="detalhe-pagamento"></div>

    <div class="area-botoes">
        <button class="btn-acao" style="background: #25d366;" onclick="enviarWhatsApp()">WhatsApp</button>
        <button class="btn-acao" onclick="executarImpressao()">PDF (Imprimir)</button>
        <button class="btn-acao" style="background: #6c757d; height: 40px; font-size: 11px;" onclick="window.deslogar()">Sair da Conta</button>
    </div>

    <div class="footer-contato">
        <a href="https://wa.me/5500000000000" target="_blank">CONTATODESENVOLVEDOR</a>
    </div>
</div>

<div id="print-area"></div>
