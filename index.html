<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA VENDAS</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; padding: 10px; margin: 0; }
        .caixa { background: #fff; padding: 20px; border-radius: 10px; max-width: 450px; margin: auto; }
        h2 { text-align: center; color: #075e54; margin-bottom: 20px; }
        label { display: block; font-weight: bold; font-size: 12px; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #25d366; color: white; border: none; width: 100%; padding: 18px; margin-top: 25px; border-radius: 10px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="caixa">
    <h2>PEDIDO WHATSAPP</h2>
    
    <label>CLIENTE</label>
    <input type="text" id="c1">
    
    <label>TELEFONE</label>
    <input type="tel" id="c2">

    <label>ENDEREÇO (RUA/Nº)</label>
    <input type="text" id="c3">

    <label>BAIRRO</label>
    <input type="text" id="c4">

    <label>CIDADE</label>
    <input type="text" id="c5">

    <label>MERCADORIAS</label>
    <textarea id="c6" rows="3"></textarea>

    <label>VALOR TOTAL</label>
    <input type="text" id="c7">

    <label>VENDEDOR</label>
    <input type="text" id="c8">

    <button class="btn" onclick="forcarEnvio()">ENVIAR AGORA</button>
</div>

<script>
    function forcarEnvio() {
        // Captura direta sem rodeios
        var cliente  = document.getElementById('c1').value;
        var fone     = document.getElementById('c2').value;
        var rua      = document.getElementById('c3').value;
        var bairro   = document.getElementById('c4').value;
        var cidade   = document.getElementById('c5').value;
        var itens    = document.getElementById('c6').value;
        var total    = document.getElementById('c7').value;
        var vendedor = document.getElementById('c8').value;

        // Montagem da mensagem usando "Template Literals" (mais estável em telemóveis novos)
        var msg = `*PEDIDO JÁ*
--------------------------
*CLIENTE:* ${cliente}
*FONE:* ${fone}
*ENDEREÇO:* ${rua}
*BAIRRO:* ${bairro}
*CIDADE:* ${cidade}
--------------------------
*ITENS:* ${itens}
--------------------------
*TOTAL:* R$ ${total}
*VENDEDOR:* ${vendedor}`;

        // Codificação ultra-segura
        var textoFinal = encodeURIComponent(msg);
        
        // Link alternativo (wa.me é mais direto que api.whatsapp)
        var urlFinal = "https://wa.me/?text=" + textoFinal;

        // Tenta abrir o WhatsApp forçando a navegação
        window.location.replace(urlFinal);
    }
</script>

</body>
</html>
