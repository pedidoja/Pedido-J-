<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEDIDO JÁ - VERSÃO WHATSAPP TOTAL</title>
    <style>
        body { font-family: sans-serif; background: #e8ecef; margin: 0; padding: 10px; }
        .card { background: #fff; padding: 15px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #075E54; margin-top: 0; }
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 10px; color: #333; }
        input, textarea { width: 100%; padding: 12px; margin-top: 4px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #25d366; outline: none; }
        
        .btn-zap { background: #25d366; color: white; border: none; width: 100%; padding: 18px; border-radius: 8px; font-weight: bold; margin-top: 20px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #128C7E; }
        .btn-zap:active { box-shadow: none; transform: translateY(4px); }
        
        .btn-pdf { background: #1a73e8; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 16px; opacity: 0.9; }

        /* Estilo da Via de Impressão */
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .ticket { border: 2px solid #000; padding: 20px; font-size: 16px; line-height: 1.6; color: #000; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>PEDIDO JÁ ✅</h2>

    <label>NOME DO CLIENTE</label>
    <input type="text" id="cli" placeholder="Digite o nome...">
    
    <label>WHATSAPP / CELULAR</label>
    <input type="tel" id="tel" placeholder="(00) 00000-0000">

    <label>ENDEREÇO COMPLETO (RUA E Nº)</label>
    <input type="text" id="end" placeholder="Rua exemplo, 123">

    <label>BAIRRO</label>
    <input type="text" id="bai" placeholder="Bairro exemplo">

    <label>CIDADE</label>
    <input type="text" id="cid" placeholder="Cidade exemplo">

    <label>PONTO DE REFERÊNCIA</label>
    <input type="text" id="ref" placeholder="Perto de onde?">

    <label>MERCADORIAS (ITENS)</label>
    <textarea id="it" style="height: 100px;" placeholder="Ex: 1 Cama Box R$ 500"></textarea>

    <div style="background:#f9f9f9; padding:10px; border:1px solid #ddd; margin-top:10px; border-radius:5px;">
        <label>VALOR DO FRETE</label>
        <input type="text" id="fr" placeholder="R$ 0,00">
        
        <label>TOTAL DO PEDIDO</label>
        <input type="text" id="to" placeholder="R$ 0,00" style="font-weight:bold; color:red;">
    </div>

    <label>FORMA DE PAGAMENTO</label>
    <input type="text" id="pa" placeholder="Dinheiro, Pix, Cartão...">

    <label>VENDEDOR</label>
    <input type="text" id="ve" placeholder="Nome do vendedor">

    <button class="btn-zap" onclick="enviarZap()">MANDAR NO WHATSAPP</button>
    <button class="btn-pdf" onclick="gerarPDF()">IMPRIMIR RECIBO</button>
</div>

<div id="print-area"></div>

<script>
    function enviarZap() {
        // Coleta manual campo por campo para não ter erro
        var c = document.getElementById('cli').value.toUpperCase();
        var t = document.getElementById('tel').value;
        var e = document.getElementById('end').value.toUpperCase();
        var b = document.getElementById('bai').value.toUpperCase();
        var i = document.getElementById('cid').value.toUpperCase();
        var r = document.getElementById('ref').value.toUpperCase();
        var it = document.getElementById('it').value.toUpperCase();
        var fr = document.getElementById('fr').value;
        var to = document.getElementById('to').value;
        var pa = document.getElementById('pa').value.toUpperCase();
        var ve = document.getElementById('ve').value.toUpperCase();

        var msg = "*PEDIDO JÁ*\n\n" +
                  "*CLIENTE:* " + c + "\n" +
                  "*TEL:* " + t + "\n" +
                  "*RUA:* " + e + "\n" +
                  "*BAIRRO:* " + b + "\n" +
                  "*CIDADE:* " + i + "\n" +
                  "*REF:* " + r + "\n\n" +
                  "*ITENS:* \n" + it + "\n\n" +
                  "*FRETE:* " + fr + "\n" +
                  "*TOTAL:* " + to + "\n" +
                  "*PAGTO:* " + pa + "\n\n" +
                  "*VENDEDOR:* " + ve;

        // O segredo: usamos o link direto do WhatsApp Web/App
        var win = window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg), '_blank');
        if (win) {
            win.focus();
        } else {
            // Se o navegador bloquear o pop-up, ele tenta por aqui:
            window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(msg);
        }
    }

    function gerarPDF() {
        var c = document.getElementById('cli').value.toUpperCase();
        var t = document.getElementById('tel').value;
        var e = document.getElementById('end').value.toUpperCase();
        var b = document.getElementById('bai').value.toUpperCase();
        var i = document.getElementById('cid').value.toUpperCase();
        var r = document.getElementById('ref').value.toUpperCase();
        var it = document.getElementById('it').value.toUpperCase();
        var fr = document.getElementById('fr').value;
        var to = document.getElementById('to').value;
        var pa = document.getElementById('pa').value.toUpperCase();
        var ve = document.getElementById('ve').value.toUpperCase();

        var conteudo = "<div class='ticket'>" +
                       "<h1 style='text-align:center'>PEDIDO JÁ</h1>" +
                       "<p><b>CLIENTE:</b> " + c + " <br> <b>TEL:</b> " + t + "</p>" +
                       "<p><b>ENDEREÇO:</b> " + e + " <br> <b>BAIRRO:</b> " + b + " - " + i + "</p>" +
                       "<p><b>REF:</b> " + r + "</p>" +
                       "<hr>" +
                       "<p><b>ITENS:</b><br>" + it.replace(/\n/g, "<br>") + "</p>" +
                       "<hr>" +
                       "<p><b>FRETE:</b> " + fr + "</p>" +
                       "<h2 style='color:red'>TOTAL: " + to + "</h2>" +
                       "<p><b>PAGAMENTO:</b> " + pa + "</p>" +
                       "<p><b>VENDEDOR:</b> " + ve + "</p>" +
                       "</div>";

        document.getElementById('print-area').innerHTML = conteudo + "<br><hr style='border:1px dashed #000'><br>" + conteudo;
        window.print();
    }
</script>
</body>
</html>
