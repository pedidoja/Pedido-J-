<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedido Já</title>
    <style>
        /* --- ESTILO GERAL (LAYOUT WEB) --- */
        body { font-family: sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: 20px; padding-bottom: 10px; font-weight: bold; }
        
        .campo { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; margin-bottom: 3px; }
        
        input, textarea, select { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            font-size: 14px; box-sizing: border-box; background: #fff; 
            height: 45px; 
        }

        textarea { height: 45px; min-height: 45px; resize: vertical; font-family: sans-serif; }

        /* REMOÇÃO DAS SETINHAS */
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .btn-add { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; margin-bottom: 15px; text-transform: uppercase; }
        
        .area-botoes { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 20px; width: 100%; }

        .btn-acao { 
            flex: 1; height: 50px; border: none; border-radius: 8px; font-weight: bold; 
            cursor: pointer; font-size: 16px; text-transform: uppercase; color: white; 
            display: flex; align-items: center; justify-content: center;
            background: #28a745;
        }

        /* Botão Novo Pedido Cinza */
        .btn-novo { background: #6c757d; }

        #detalhe-pagamento {
            background: #fdf2f2; border: 1px solid #ffc1c1; padding: 12px; border-radius: 6px;
            margin-bottom: 15px; display: none; font-size: 14px; line-height: 1.6; color: #333;
            font-weight: bold; text-transform: uppercase; font-family: monospace;
        }

        /* --- CONFIGURAÇÃO DE IMPRESSÃO --- */
        @media print {
            @page { size: landscape; margin: 0; }
            html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { 
                visibility: visible; 
                color: #000 !important; 
            }
            #print-area { 
                position: absolute; left: 0; top: 0; 
                display: flex !important; width: 100vw; height: 100vh; 
                gap: 10mm; padding: 8mm; box-sizing: border-box;
                align-items: stretch; 
            }
            .via { 
                width: 48%; border: 1px dashed #000; padding: 15px; 
                display: flex; flex-direction: column; font-size: 11px; 
                height: 94vh; 
                box-sizing: border-box;
            }
            .header-p { text-align: center; font-weight: bold; font-size: 16px; border-bottom: 2px solid #000; margin-bottom: 10px; }
            .resumo-print { font-weight: bold; margin-top: 5px; font-size: 11px; line-height: 1.4; text-transform: uppercase; font-family: monospace; }
            .assinaturas-v { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
            .label-p { font-weight: bold; margin-right: 5px; }
            .merc-item-p { 
                word-break: break-word; 
                white-space: pre-wrap; 
                line-height: 1.2; 
                padding: 4px 0; 
                border-bottom: none; 
            }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">PEDIDO JÁ</div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Data do Pedido</label><input type="date" id="i-data"></div>
        <div class="campo" style="flex: 1;"><label>Data da Entrega</label><input type="date" id="i-entrega"></div>
    </div>
    
    <div class="campo"><label>Cliente</label><input type="text" id="i-cliente"></div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 3;"><label>Rua</label><input type="text" id="i-rua"></div>
        <div class="campo" style="flex: 1;"><label>Número</label><input type="text" id="i-num"></div>
    </div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Bairro</label><input type="text" id="i-bairro"></div>
        <div class="campo" style="flex: 1;"><label>Cidade</label><input type="text" id="i-cidade"></div>
    </div>
    
    <div class="campo"><label>Ponto de Referência</label><textarea id="i-ref"></textarea></div>
    
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;"><label>Telefone</label><input type="text" id="i-tel"></div>
        <div class="campo" style="flex: 1.5;"><label>Obs (Breve)</label><textarea id="i-obs-breve"></textarea></div>
    </div>

    <div id="lista-mercadorias">
        <label>Mercadorias</label>
        <div class="linha-mercadoria" style="display: flex; gap: 10px; margin-bottom: 8px;">
            <textarea placeholder="Descrição" style="flex: 3;" class="m-desc"></textarea>
            <input type="text" placeholder="UN" style="flex: 0.6;" class="m-un">
            <input type="number" step="0.01" placeholder="0,00" style="flex: 1.2;" class="m-val" oninput="calcularTotais()" onblur="formatarMoeda(this)" onkeydown="bloquearAcoesExtras(event)">
        </div>
    </div>
    <button class="btn-add" onclick="adicionarLinha()">+ Item</button>

    <div style="display: flex; gap: 10px; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        <div class="campo" style="flex: 1;"><label>Subtotal</label><input type="number" id="i-v-merc" readonly tabindex="-1"></div>
        <div class="campo" style="flex: 1;"><label>Frete</label><input type="number" step="0.01" id="i-v-frete" oninput="calcularTotais()" onblur="formatarMoeda(this)" onkeydown="bloquearAcoesExtras(event)"></div>
        <div class="campo" style="flex: 1;"><label>Total Pedido</label><input type="number" id="i-v-total" readonly style="font-weight: bold; color: #1a73e8;" tabindex="-1"></div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
        <div class="campo" style="flex: 1; min-width: 120px;"><label>Forma de Pagamento</label><select id="i-pagamento" onchange="alternarCartao()"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão">Cartão</option></select></div>
        <div class="campo" id="box-tipo-cartao" style="flex: 1; display: none; min-width: 100px;"><label>Tipo</label><select id="i-tipo-cartao" onchange="alternarCartao()"><option value="Credito">Crédito</option><option value="Debito">Débito</option></select></div>
        <div class="campo" id="box-parcelas" style="flex: 1; display: none; min-width: 80px;"><label>Parcelas</label><select id="i-parcelas" onchange="calcularTotais()"><option value="1">1x</option><option value="2">2x</option><option value="3">3x</option><option value="4">4x</option><option value="5">5x</option><option value="6">6x</option><option value="7">7x</option><option value="8">8x</option><option value="9">9x</option><option value="10">10x</option><option value="11">11x</option><option value="12">12x</option></select></div>
        <div class="campo" id="box-entrada" style="flex: 1.5; display: none; min-width: 150px;"><label>Dinheiro/Pix</label><input type="number" step="0.01" id="i-v-entrada" placeholder="0,00" oninput="calcularTotais()" onblur="formatarMoeda(this)" onkeydown="bloquearAcoesExtras(event)"></div>
    </div>

    <div id="detalhe-pagamento"></div>
    <div class="campo"><label>Observações Gerais</label><textarea id="i-obs" style="height: 50px;"></textarea></div>
    <div style="display: flex; gap: 10px;"><div class="campo" style="flex: 1;"><label>Vendedor</label><input type="text" id="i-vend"></div><div class="campo" style="flex: 1;"><label>Supervisor</label><input type="text" id="i-super"></div></div>

    <div class="area-botoes">
        <button class="btn-acao btn-novo" onclick="novoPedido()">Novo Pedido</button>
        <button class="btn-acao" style="background: #25d366;" onclick="enviarWhatsApp()">WhatsApp</button>
        <button class="btn-acao" onclick="executarImpressao()">Imprimir</button>
    </div>
</div>

<div id="print-area"></div>

<script>
    const taxasCredito = { "1": 3.37, "2": 4.90, "3": 6.80, "4": 7.90, "5": 9.80, "6": 11.49, "7": 12.80, "8": 14.87, "9": 15.83, "10": 16.87, "11": 18.89, "12": 20.10 };
    const taxaDebito = 2.00;

    function bloquearAcoesExtras(e) { if (e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault(); }
    document.addEventListener('wheel', function(e) { if (document.activeElement.type === 'number') document.activeElement.blur(); }, { passive: false });

    function formatarMoeda(input) { if (input.value !== "") input.value = parseFloat(input.value).toFixed(2); }

    function adicionarLinha() {
        const div = document.createElement('div');
        div.className = 'linha-mercadoria';
        div.style.display = "flex"; div.style.gap = "10px"; div.style.marginBottom = "8px";
        div.innerHTML = `<textarea placeholder="Descrição" style="flex:3;" class="m-desc"></textarea><input type="text" placeholder="UN" style="flex:0.6;" class="m-un"><input type="number" step="0.01" placeholder="0,00" style="flex:1.2;" class="m-val" oninput="calcularTotais()" onblur="formatarMoeda(this)" onkeydown="bloquearAcoesExtras(event)">`;
        document.getElementById('lista-mercadorias').appendChild(div);
    }

    function alternarCartao() {
        const pag = document.getElementById('i-pagamento').value;
        const tipo = document.getElementById('i-tipo-cartao').value;
        document.getElementById('box-tipo-cartao').style.display = (pag === 'Cartão') ? 'block' : 'none';
        document.getElementById('box-parcelas').style.display = (pag === 'Cartão' && tipo === 'Credito') ? 'block' : 'none';
        document.getElementById('box-entrada').style.display = (pag === 'Cartão') ? 'block' : 'none';
        document.getElementById('detalhe-pagamento').style.display = (pag === 'Cartão') ? 'block' : 'none';
        calcularTotais();
    }

    function montarTextoPagamento(totalPedido, entrada, pag, tipo, parcelas) {
        if (pag !== 'Cartão') return "";
        let baseCartao = totalPedido - entrada;
        if(baseCartao < 0) baseCartao = 0;
        let taxa = (tipo === 'Credito') ? (taxasCredito[parcelas] / 100) : (taxaDebito / 100);
        let valorCartaoComTaxa = baseCartao + (baseCartao * taxa);
        let valorFinalTotal = entrada + valorCartaoComTaxa;
        let texto = `CARTÃO VALOR R$ ${valorCartaoComTaxa.toFixed(2)}`;
        if (tipo === 'Credito') texto += ` EM ${parcelas} x R$ ${(valorCartaoComTaxa/parcelas).toFixed(2)}`;
        else texto += ` (DEBITO)`;
        if (entrada > 0) texto += `<br>DINHEIRO/PIX R$ ${entrada.toFixed(2)}`;
        texto += `<br>VALOR TOTAL R$ ${valorFinalTotal.toFixed(2)}`;
        return texto;
    }

    function calcularTotais() {
        let somaMerc = 0;
        document.querySelectorAll('.m-val').forEach(el => somaMerc += parseFloat(el.value) || 0);
        const frete = parseFloat(document.getElementById('i-v-frete').value) || 0;
        const totalPedido = somaMerc + frete;
        const entrada = parseFloat(document.getElementById('i-v-entrada').value) || 0;
        document.getElementById('i-v-merc').value = somaMerc.toFixed(2);
        document.getElementById('i-v-total').value = totalPedido.toFixed(2);
        const pag = document.getElementById('i-pagamento').value;
        if (pag === 'Cartão') {
            const tipo = document.getElementById('i-tipo-cartao').value;
            const parcelas = document.getElementById('i-parcelas').value;
            document.getElementById('detalhe-pagamento').innerHTML = montarTextoPagamento(totalPedido, entrada, pag, tipo, parcelas);
        }
    }

    // FUNÇÃO NOVO PEDIDO
    function novoPedido() {
        if (confirm("Deseja limpar todos os campos para um novo pedido?")) {
            location.reload();
        }
    }

    // FUNÇÃO PULAR COM ENTER
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const ativo = document.activeElement;
            // Se estiver em um textarea, o Enter pula linha normalmente
            if (ativo.tagName === 'TEXTAREA') return;

            e.preventDefault();
            const seletores = 'input:not([readonly]), select, button';
            const elementos = Array.from(document.querySelectorAll(seletores));
            const index = elementos.indexOf(ativo);
            
            if (index > -1 && index < elementos.length - 1) {
                elementos[index + 1].focus();
            }
        }
    });

    function executarImpressao() {
        const formatarData = (data) => data ? data.split('-').reverse().join('/') : "";
        let mercsHTML = "";
        document.querySelectorAll('.m-desc').forEach((el, i) => {
            const val = parseFloat(document.querySelectorAll('.m-val')[i].value) || 0;
            const un = document.querySelectorAll('.m-un')[i].value || "1";
            if(el.value || val > 0) {
                mercsHTML += `<div class="merc-item-p" style="display:flex; gap:5px;"><div style="flex:3">${el.value.toUpperCase()}</div><div style="flex:0.6; text-align:center">${un}</div><div style="flex:1.2; text-align:right">R$ ${val.toFixed(2)}</div></div>`;
            }
        });
        const d = {
            dataP: formatarData(document.getElementById('i-data').value), dataE: formatarData(document.getElementById('i-entrega').value),
            cli: document.getElementById('i-cliente').value.toUpperCase(), rua: document.getElementById('i-rua').value.toUpperCase(),
            num: document.getElementById('i-num').value, bairro: document.getElementById('i-bairro').value.toUpperCase(),
            cidade: document.getElementById('i-cidade').value.toUpperCase(), ref: document.getElementById('i-ref').value.toUpperCase(),
            tel: document.getElementById('i-tel').value, obsB: document.getElementById('i-obs-breve').value.toUpperCase(),
            vMerc: document.getElementById('i-v-merc').value, vFrete: document.getElementById('i-v-frete').value || "0.00",
            vTotal: document.getElementById('i-v-total').value, pag: document.getElementById('i-pagamento').value === 'Cartão' ? `CARTÃO ${document.getElementById('i-tipo-cartao').value.toUpperCase()}` : document.getElementById('i-pagamento').value.toUpperCase(),
            resumo: montarTextoPagamento(parseFloat(document.getElementById('i-v-total').value), parseFloat(document.getElementById('i-v-entrada').value) || 0, document.getElementById('i-pagamento').value, document.getElementById('i-tipo-cartao').value, document.getElementById('i-parcelas').value),
            obs: document.getElementById('i-obs').value.toUpperCase(), vend: document.getElementById('i-vend').value.toUpperCase(), sup: document.getElementById('i-super').value.toUpperCase()
        };
        const viaHTML = `<div class="via"><div class="header-p">PEDIDO JÁ</div><div style="display:flex; gap:10px"><div style="flex:1"><span class="label-p">DATA PEDIDO:</span> ${d.dataP}</div><div style="flex:1"><span class="label-p">DATA ENTREGA:</span> ${d.dataE}</div></div><div class="item-print"><span class="label-p">CLIENTE:</span> ${d.cli}</div><div style="display:flex; gap:10px"><div style="flex:3"><span class="label-p">RUA:</span> ${d.rua}</div><div style="flex:1"><span class="label-p">Nº:</span> ${d.num}</div></div><div style="display:flex; gap:10px"><div style="flex:1"><span class="label-p">BAIRRO:</span> ${d.bairro}</div><div style="flex:1"><span class="label-p">CIDADE:</span> ${d.cidade}</div></div><div class="item-print"><span class="label-p">REF:</span> ${d.ref}</div><div style="display:flex; gap:10px"><div style="flex:1"><span class="label-p">TEL:</span> ${d.tel}</div><div style="flex:1.5"><span class="label-p">OBS:</span> ${d.obsB}</div></div><div style="margin-top:10px; font-weight:bold; border-bottom:1px solid #000; display:flex; font-size:10px;"><div style="flex:3">MERCADORIA</div><div style="flex:0.6; text-align:center">UN</div><div style="flex:1.2; text-align:right">VALOR</div></div><div style="min-height:80px;">${mercsHTML}</div><div style="margin-top:auto; border-top:1px solid #000; padding-top:5px;"><div style="display:flex; justify-content:space-between;"><span>SUBTOTAL:</span> <b>R$ ${d.vMerc}</b></div><div style="display:flex; justify-content:space-between;"><span>FRETE:</span> <b>R$ ${d.vFrete}</b></div><div style="display:flex; justify-content:space-between; font-size:11px; border-top:1px solid #ccc;"><span>TOTAL PEDIDO:</span> <b>R$ ${d.vTotal}</b></div></div><div style="margin-top:8px"><span class="label-p">FORMA DE PAGAMENTO:</span> ${d.pag}</div><div class="resumo-print">${d.resumo}</div><div style="margin-top:5px"><span class="label-p">OBSERVAÇÕES GERAIS:</span> ${d.obs}</div><div class="assinaturas-v"><div style="margin-top:10px;"><b>VENDEDOR</b><br>${d.vend}</div><div style="margin-top:5px;"><b>SUPERVISOR</b><br>${d.sup}</div></div></div>`;
        document.getElementById('print-area').innerHTML = viaHTML + viaHTML;
        window.print();
    }

    function enviarWhatsApp() {
        const formatarData = (data) => data ? data.split('-').reverse().join('/') : "";
        const f = (id) => document.getElementById(id).value.toUpperCase();
        let itensTexto = "";
        document.querySelectorAll('.m-desc').forEach((el, i) => {
            const val = parseFloat(document.querySelectorAll('.m-val')[i].value) || 0;
            const un = document.querySelectorAll('.m-un')[i].value || "1";
            if(el.value || val > 0) itensTexto += `*${el.value.toUpperCase()}*\nUN: ${un} | VALOR: R$ ${val.toFixed(2)}\n\n`;
        });
        const pag = f('i-pagamento');
        let resumoPagamento = (pag === 'CARTÃO') ? "\n" + montarTextoPagamento(parseFloat(document.getElementById('i-v-total').value), parseFloat(document.getElementById('i-v-entrada').value) || 0, 'Cartão', document.getElementById('i-tipo-cartao').value, document.getElementById('i-parcelas').value).replace(/<br>/g, '\n') : "";
        let msg = `-------------------------------\n      PEDIDO JA\n-------------------------------\n\n`;
        msg += `DATA PEDIDO: ${formatarData(document.getElementById('i-data').value)}\nDATA ENTREGA: ${formatarData(document.getElementById('i-entrega').value)}\n\n`;
        msg += `CLIENTE: ${f('i-cliente')}\nRUA: ${f('i-rua')}, N: ${document.getElementById('i-num').value}\nBAIRRO: ${f('i-bairro')}\nCIDADE: ${f('i-cidade')}\nREF: ${f('i-ref')}\nTEL: ${document.getElementById('i-tel').value}\nOBS: ${f('i-obs-breve')}\n\n`;
        msg += `MERCADORIA\n-------------------------------\n${itensTexto}-------------------------------\n\n`;
        msg += `FINANCEIRO\nSUBTOTAL: R$ ${document.getElementById('i-v-merc').value}\nFRETE: R$ ${document.getElementById('i-v-frete').value || "0.00"}\nTOTAL PEDIDO: R$ ${document.getElementById('i-v-total').value}\n\n`;
        msg += `FORMA DE PAGAMENTO: ${pag} ${pag === 'CARTÃO' ? f('i-tipo-cartao') : ""}\n${resumoPagamento}\n\n`;
        if(f('i-obs')) msg += `OBS GERAIS: ${f('i-obs')}\n\n`;
        msg += `VENDEDOR: ${f('i-vend')}\nSUPERVISOR: ${f('i-super')}`;
        window.open(`https://api.whatsapp.com/send?text=${window.encodeURIComponent(msg)}`);
    }
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('App Pronto para Uso!'))
      .catch(err => console.log('Erro ao carregar App:', err));
  }
</script>
</body>
</html>
