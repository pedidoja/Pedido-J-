<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEDIDO JÁ - FINAL</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 10px; margin: 0; }
        .box { background: #fff; padding: 15px; border-radius: 10px; max-width: 500px; margin: auto; border: 1px solid #ccc; }
        .header { text-align: center; color: #1a73e8; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #1a73e8; padding-bottom: 5px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 10px; color: #555; }
        input, textarea { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid #999; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-transform: uppercase; }
        .btn-zap { background: #25d366; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 16px; }
        .btn-pdf { background: #1a73e8; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 8px; font-size: 16px; }
        
        #area-print { display: none; }
        @media print {
            body * { visibility: hidden; }
            #area-print, #area-print * { visibility: visible; }
            #area-print { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .recibo { border: 2px solid black; padding: 15px; margin-bottom: 20px; font-size: 14px; line-height: 1.5; color: black; }
        }
    </style>
</head>
<body>

<div class="box">
    <div class="header">PEDIDO JÁ</div>

    <label>NOME DO CLIENTE</label>
    <input type="text" id="cli" oninput="save()">
    
    <label>TELEFONE / WHATSAPP</label>
    <input type="tel" id="tel" oninput="save()">

    <label>RUA E NÚMERO</label>
    <input type="text" id="rua" oninput="save()">

    <label>BAIRRO</label>
    <input type="text" id="bai" oninput="save()">

    <label>CIDADE</label>
    <input type="text" id="cid" oninput="save()">

    <label>PONTO DE REFERÊNCIA</label>
    <input type="text" id="ref" oninput="save()">

    <label>DESCRIÇÃO DO PEDIDO (ITENS E VALORES)</label>
    <textarea id="ped" style="height: 100px;" oninput="save()" placeholder="Ex: 1 Cama - R$ 500"></textarea>

    <div style="background:#eee; padding:10px; border-radius:5px; margin-top:10px;">
        <label>VALOR DO FRETE (R$)</label>
        <input type="number" id="fre" oninput="save()">
        <label>VALOR TOTAL (R$)</label>
        <input type="text" id="tot" oninput="save()">
    </div>

    <label>FORMA DE PAGAMENTO</label>
    <input type="text" id="pag" oninput="save()">

    <label>VENDEDOR</label>
    <input type="text" id="ven" oninput="save()">

    <button class="btn-zap" onclick="enviarZap()">ENVIAR PELO WHATSAPP</button>
    <button class="btn-pdf" onclick="gerarPDF()">GERAR PDF / IMPRIMIR</button>
</div>

<div id="area-print"></div>

<script>
    // Memória global para evitar que o celular "esqueça"
    var dados = {};

    function save() {
        dados.cliente = document.getElementById('cli').value.toUpperCase();
        dados.telefone = document.getElementById('tel').value;
        dados.rua = document.getElementById('rua').value.toUpperCase();
        dados.bairro = document.getElementById('bai').value.toUpperCase();
        dados.cidade = document.getElementById('cid').value.toUpperCase();
        dados.referencia = document.getElementById('ref').value.toUpperCase();
        dados.itens = document.getElementById('ped').value.toUpperCase();
        dados.frete = document.getElementById('fre').value;
        dados.total = document.getElementById('tot').value;
        dados.pagamento = document.getElementById('pag').value.toUpperCase();
        dados.vendedor = document.getElementById('ven').value.toUpperCase();
    }

    function enviarZap() {
        save(); // Força a última captura
        var msg = "*PEDIDO JÁ*\n\n" +
                  "*CLIENTE:* " + (dados.cliente || "---") + "\n" +
                  "*TEL:* " + (dados.telefone || "---") + "\n" +
                  "*ENDEREÇO:* " + (dados.rua || "---") + "\n" +
                  "*BAIRRO:* " + (dados.bairro || "---") + "\n" +
                  "*CIDADE:* " + (dados.cidade || "---") + "\n" +
                  "*REF:* " + (dados.referencia || "---") + "\n\n" +
                  "*ITENS:*\n" + (dados.itens || "---") + "\n\n" +
                  "*FRETE:* R$ " + (dados.frete || "0,00") + "\n" +
                  "*TOTAL:* R$ " + (dados.total || "0,00") + "\n" +
                  "*PAGTO:* " + (dados.pagamento || "---") + "\n\n" +
                  "*VENDEDOR:* " + (dados.vendedor || "---");

        window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(msg);
    }

    function gerarPDF() {
        save();
        var layout = "<div class='recibo'>" +
                     "<h1 style='text-align:center'>PEDIDO JÁ</h1>" +
                     "<p><b>CLIENTE:</b> " + dados.cliente + "</p>" +
                     "<p><b>FONE:</b> " + dados.telefone + "</p>" +
                     "<p><b>ENDEREÇO:</b> " + dados.rua + "</p>" +
                     "<p><b>BAIRRO:</b> " + dados.bairro + " | <b>CIDADE:</b> " + dados.cidade + "</p>" +
                     "<p><b>REF:</b> " + dados.referencia + "</p>" +
                     "<hr>" +
                     "<p><b>ITENS:</b><br>" + dados.itens.replace(/\n/g, '<br>') + "</p>" +
                     "<hr>" +
                     "<p><b>FRETE:</b> R$ " + dados.frete + "</p>" +
                     "<p style='font-size:18px'><b>TOTAL: R$ " + dados.total + "</b></p>" +
                     "<p><b>PAGAMENTO:</b> " + dados.pagamento + "</p>" +
                     "<p><b>VENDEDOR:</b> " + dados.vendedor + "</p>" +
                     "</div>";

        document.getElementById('area-print').innerHTML = layout + layout;
        setTimeout(function(){ window.print(); }, 500);
    }
</script>
</body>
</html>
