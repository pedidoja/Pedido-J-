<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEDIDO JÁ V10</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f0f0; }
        .box { background: #fff; padding: 15px; border-radius: 8px; max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #999; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        label { font-weight: bold; font-size: 12px; color: #333; display: block; margin-top: 10px; }
        .btn-zap { background: #25d366; color: white; font-weight: bold; width: 100%; border: none; padding: 15px; margin-top: 20px; border-radius: 5px; font-size: 16px; }
        .btn-pdf { background: #1a73e8; color: white; font-weight: bold; width: 100%; border: none; padding: 15px; margin-top: 10px; border-radius: 5px; font-size: 16px; }
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .via { border: 1px solid #000; padding: 15px; margin-bottom: 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center; color:#1a73e8;">PEDIDO JÁ</h2>
    
    <label>NOME DO CLIENTE</label>
    <input type="text" id="cli">
    
    <label>TELEFONE</label>
    <input type="tel" id="tel">

    <label>ENDEREÇO (RUA, Nº, BAIRRO, CIDADE)</label>
    <textarea id="end" style="height: 80px;" placeholder="RUA TAL, 10 - CENTRO - CIDADE"></textarea>
    
    <label>REFERÊNCIA</label>
    <input type="text" id="ref">

    <label>LISTA DE PRODUTOS E VALORES</label>
    <textarea id="prod" style="height: 100px;" placeholder="1 CAMA - 200,00&#10;1 MESA - 100,00"></textarea>

    <div style="background:#eee; padding:10px; margin-top:10px;">
        <label>VALOR DO FRETE</label>
        <input type="number" id="frete" value="0">
        <label>TOTAL DO PEDIDO</label>
        <input type="text" id="total_geral">
    </div>

    <label>FORMA DE PAGAMENTO</label>
    <input type="text" id="pag">

    <label>VENDEDOR / SUPERVISOR</label>
    <input type="text" id="vend">

    <button class="btn-zap" onclick="enviarZap()">ENVIAR PELO WHATSAPP</button>
    <button class="btn-pdf" onclick="gerarPDF()">GERAR PDF / IMPRIMIR</button>
</div>

<div id="print-area"></div>

<script>
    function enviarZap() {
        // Pega os dados EXATAMENTE como estão na tela
        var cliente = document.getElementById('cli').value.toUpperCase();
        var telefone = document.getElementById('tel').value;
        var endereco = document.getElementById('end').value.toUpperCase();
        var referencia = document.getElementById('ref').value.toUpperCase();
        var produtos = document.getElementById('prod').value.toUpperCase();
        var frete = document.getElementById('frete').value;
        var total = document.getElementById('total_geral').value;
        var pagto = document.getElementById('pag').value.toUpperCase();
        var vendedor = document.getElementById('vend').value.toUpperCase();

        var texto = "*PEDIDO JÁ*\n\n" +
                    "*CLIENTE:* " + cliente + "\n" +
                    "*TEL:* " + telefone + "\n" +
                    "*ENDEREÇO:* " + endereco + "\n" +
                    "*REF:* " + referencia + "\n\n" +
                    "*PRODUTOS:*\n" + produtos + "\n\n" +
                    "*FRETE:* R$ " + frete + "\n" +
                    "*TOTAL:* " + total + "\n" +
                    "*PAGAMENTO:* " + pagto + "\n\n" +
                    "*VENDEDOR:* " + vendedor;

        var url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(texto);
        window.location.href = url;
    }

    function gerarPDF() {
        var cliente = document.getElementById('cli').value.toUpperCase();
        var endereco = document.getElementById('end').value.toUpperCase();
        var produtos = document.getElementById('prod').value.toUpperCase();
        var total = document.getElementById('total_geral').value;

        var conteudo = "<div class='via'>" +
                       "<h2>PEDIDO JÁ</h2>" +
                       "<p><b>CLIENTE:</b> " + cliente + "</p>" +
                       "<p><b>ENDEREÇO:</b> " + endereco + "</p>" +
                       "<hr>" +
                       "<p><b>PRODUTOS:</b><br>" + produtos.replace(/\n/g, '<br>') + "</p>" +
                       "<hr>" +
                       "<h3>TOTAL: " + total + "</h3>" +
                       "</div>";

        document.getElementById('print-area').innerHTML = conteudo + conteudo;
        window.print();
    }
</script>
</body>
</html>
