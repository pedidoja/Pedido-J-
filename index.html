<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEDIDO JÁ - MODELO ORIGINAL</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #1a73e8; font-size: 20px; font-weight: bold; border-bottom: 2px solid #1a73e8; margin-bottom: 15px; padding-bottom: 10px; }
        
        label { display: block; font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-transform: uppercase; }
        
        .grid { display: flex; gap: 10px; }
        .grid > div { flex: 1; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        .btn-zap { background: #25d366; }
        .btn-pdf { background: #1a73e8; }

        .tabela-juros { background: #eef4ff; padding: 10px; border-radius: 8px; margin-top: 15px; border: 1px solid #1a73e8; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 5px; border-bottom: 1px solid #cce0ff; }

        #area-impressao { display: none; }
        @media print {
            body * { visibility: hidden; }
            #area-impressao, #area-impressao * { visibility: visible; }
            #area-impressao { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .recibo { border: 2px solid #000; padding: 20px; margin-bottom: 30px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">PEDIDO JÁ</div>
    
    <label>Nome do Cliente</label>
    <input type="text" id="nome">
    
    <label>WhatsApp / Telefone</label>
    <input type="tel" id="telefone">

    <label>Rua e Número</label>
    <input type="text" id="rua">

    <div class="grid">
        <div>
            <label>Bairro</label>
            <input type="text" id="bairro">
        </div>
        <div>
            <label>Cidade</label>
            <input type="text" id="cidade">
        </div>
    </div>
    
    <label>Ponto de Referência</label>
    <input type="text" id="referencia">
    
    <label>Mercadorias / Itens</label>
    <textarea id="mercadorias" rows="4"></textarea>

    <div class="grid">
        <div>
            <label>Valor Frete</label>
            <input type="text" id="frete" value="0,00">
        </div>
        <div>
            <label>Total Geral</label>
            <input type="text" id="total" style="font-weight:bold; color:red;">
        </div>
    </div>

    <label>Forma de Pagamento</label>
    <select id="pagamento">
        <option>DINHEIRO</option>
        <option>PIX</option>
        <option>DÉBITO</option>
        <option>CRÉDITO</option>
        <option>ENTRADA + RESTANTE</option>
    </select>

    <div class="tabela-juros">
        <center><b>TABELA DE JUROS (CARTÃO)</b></center>
        <table>
            <tr><td>1x (À vista)</td><td align="right">3,5%</td></tr>
            <tr><td>2x a 6x</td><td align="right">8,5%</td></tr>
            <tr><td>7x a 12x</td><td align="right">12,9%</td></tr>
        </table>
    </div>

    <label>Vendedor</label>
    <input type="text" id="vendedor" value="FABIO">

    <button class="btn btn-zap" onclick="enviarZap()">Enviar pelo WhatsApp</button>
    <button class="btn btn-pdf" onclick="imprimirPDF()">Gerar Recibo PDF</button>
</div>

<div id="area-impressao"></div>

<script>
    function enviarZap() {
        // Coleta os dados usando os IDs corretos do seu modelo antigo
        var n = document.getElementById('nome').value.toUpperCase();
        var t = document.getElementById('telefone').value;
        var r = document.getElementById('rua').value.toUpperCase();
        var b = document.getElementById('bairro').value.toUpperCase();
        var c = document.getElementById('cidade').value.toUpperCase();
        var ref = document.getElementById('referencia').value.toUpperCase();
        var m = document.getElementById('mercadorias').value.toUpperCase();
        var f = document.getElementById('frete').value;
        var tot = document.getElementById('total').value;
        var p = document.getElementById('pagamento').value;
        var v = document.getElementById('vendedor').value.toUpperCase();

        var texto = "*PEDIDO JÁ*\n\n" +
                    "*CLIENTE:* " + n + "\n" +
                    "*TEL:* " + t + "\n" +
                    "*END:* " + r + "\n" +
                    "*BAIRRO:* " + b + "\n" +
                    "*CIDADE:* " + c + "\n" +
                    "*REF:* " + ref + "\n\n" +
                    "*ITENS:* \n" + m + "\n\n" +
                    "*FRETE:* R$ " + f + "\n" +
                    "*TOTAL:* R$ " + tot + "\n" +
                    "*PAGTO:* " + p + "\n\n" +
                    "*VENDEDOR:* " + v;

        // O segredo para não cortar a informação no telemóvel:
        window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(texto);
    }

    function imprimirPDF() {
        var n = document.getElementById('nome').value.toUpperCase();
        var t = document.getElementById('telefone').value;
        var r = document.getElementById('rua').value.toUpperCase();
        var b = document.getElementById('bairro').value.toUpperCase();
        var c = document.getElementById('cidade').value.toUpperCase();
        var m = document.getElementById('mercadorias').value.toUpperCase();
        var tot = document.getElementById('total').value;
        var v = document.getElementById('vendedor').value.toUpperCase();

        var conteudo = `
            <div class="recibo">
                <h2 style="text-align:center">PEDIDO JÁ</h2>
                <p><b>CLIENTE:</b> ${n} | <b>TEL:</b> ${t}</p>
                <p><b>ENDEREÇO:</b> ${r}, ${b} - ${c}</p>
                <hr>
                <p><b>MERCADORIAS:</b><br>${m.replace(/\n/g, '<br>')}</p>
                <hr>
                <h3>TOTAL: R$ ${tot}</h3>
                <p><b>VENDEDOR:</b> ${v}</p>
            </div>
        `;

        document.getElementById('area-impressao').innerHTML = conteudo + "<br><hr style='border:1px dashed #000'><br>" + conteudo;
        window.print();
    }
</script>
</body>
</html>
