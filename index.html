<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedido Já</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1532/1532674.png">

    <style>
        body { font-family: sans-serif; background: #e9ecef; margin: 0; padding: 10px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .header { text-align: center; color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: 20px; padding-bottom: 10px; font-weight: bold; font-size: 22px; }
        .campo { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; margin-bottom: 3px; }
        
        input, textarea, select { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            font-size: 16px; box-sizing: border-box; background: #fff; height: 48px; 
            text-transform: uppercase; color: #000; 
        }
        
        textarea { height: auto; min-height: 48px; resize: vertical; font-family: sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .btn-add { background: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-bottom: 15px; text-transform: uppercase; width: 100% !important; display: block; }
        .area-botoes { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-acao { width: 100%; height: 55px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; background: #28a745; }
        .btn-novo { background: #6c757d; }
        @media (min-width: 600px) { body { padding: 20px; } .area-botoes { flex-direction: row; } .btn-add { width: auto; } }
        #detalhe-pagamento { background: #fdf2f2; border: 1px solid #ffc1c1; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 14px; line-height: 1.6; color: #333; font-weight: bold; text-transform: uppercase; font-family: monospace; }
        
        @media print {
            @page { size: landscape; margin: 8mm; }
            html, body { height: 100%; overflow: hidden; margin: 0 !important; padding: 0 !important; background: white; }
            .no-print { display: none !important; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; color: #000 !important; }
            #print-area { position: absolute; left: 0; top: 0; display: flex !important; width: 100%; justify-content: space-between; padding: 0; zoom: 98%; }
            .via { width: 47%; border: 1px dashed #000; padding: 10px; display: flex; flex-direction: column; font-size: 12px; color: #000 !important; height: 175mm; box-sizing: border-box; overflow: hidden; }
            .header-p { text-align: center; font-weight: bold; font-size: 17px; border-bottom: 2px solid #000; margin-bottom: 10px; color: #000 !important; }
            .assinaturas-v { margin-top: auto; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid #000; padding-top: 8px; color: #000 !important; }
            b, strong { color: #000 !important; }
        }

        #bloqueio-assinatura {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box;
        }
    </style
