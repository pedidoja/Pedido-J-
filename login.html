<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso Pedido Já</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .login-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acesso ao Sistema</h2>
        <input type="password" id="senha" placeholder="Digite a senha de acesso">
        <button onclick="verificar()">Entrar</button>
    </div>

    <script>
        function verificar() {
            const senha = document.getElementById('senha').value;
            // A senha aqui é só um exemplo simples
            if (senha === "123456") {
                sessionStorage.setItem('logado', 'sim');
                window.location.href = "index.html";
            } else {
                alert("Senha incorreta!");
            }
        }
    </script>
</body>
</html>
