<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PedidoJá</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCO-wCiMGjrFwViCCzF4pdJU78lJVj4vE",
            authDomain: "root-engine-465612-t1.firebaseapp.com",
            projectId: "root-engine-465612-t1",
            storageBucket: "root-engine-465612-t1.firebasestorage.app",
            messagingSenderId: "796107955427",
            appId: "1:796107955427:web:f82b413f9a4e91c41239d6",
            measurementId: "G-FV0YWFHK98"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.fazerLogin = function() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            signInWithEmailAndPassword(auth, email, senha)
                .then((userCredential) => {
                    sessionStorage.setItem('logado', 'sim');
                    window.location.href = "index.html"; // Redireciona para seu app
                })
                .catch((error) => {
                    alert("E-mail ou senha incorretos!");
                });
        }
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Acesso Individual</h2>
        <input type="email" id="email" placeholder="Seu e-mail"> <br><br>
        <input type="password" id="senha" placeholder="Sua senha"> <br><br>
        <button onclick="fazerLogin()">Entrar</button>
    </div>
</body>
</html>
