<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PedidoJá</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCO-wCiMGjrFwViCCzF4pdJU78lJVj4vE",
            authDomain: "root-engine-465612-t1.firebaseapp.com",
            projectId: "root-engine-465612-t1",
            storageBucket: "root-engine-465612-t1.firebasestorage.app",
            messagingSenderId: "796107955427",
            appId: "1:796107955427:web:f82b413f9a4e91c41239d6",
            measurementId: "G-FV0YWFHK98"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fazerLogin = function() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            signInWithEmailAndPassword(auth, email, senha)
                .then(async (userCredential) => {
                    const user = userCredential.user;
                    const docRef = doc(db, "usuarios", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const dados = docSnap.data();
                        
                        // 1. VERIFICAÇÃO DE ASSINATURA (MANTIDA POR SEGURANÇA)
                        const dataHoje = new Date().toISOString().split('T')[0];
                        if (dados.data_expiracao && dataHoje > dados.data_expiracao) {
                            alert("Sua assinatura venceu! Entre em contato com o suporte.");
                            await signOut(auth);
                            return;
                        }

                        // 2. TRAVA DE DISPOSITIVO REMOVIDA (ACESSO LIVRE)
                        sessionStorage.setItem('logado', 'sim');
                        window.location.href = "index.html";

                    } else {
                        alert("Erro: Usuário não encontrado no banco.");
                    }
                })
                .catch((error) => {
                    alert("E-mail ou senha incorretos: " + error.message);
                });
        }
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Acesso Individual</h2>
        <input type="email" id="email" placeholder="Seu e-mail"> <br><br>
        <input type="password" id="senha" placeholder="Sua senha"> <br><br>
        <button onclick="fazerLogin()">Entrar</button>
    </div>
<div style="text-align: center; margin-top: 20px;">
    <a href="admin.html" style="color: #ccc; text-decoration: none; font-size: 10px;">Configurações do Sistema</a>
</div>
</body>
</html>
