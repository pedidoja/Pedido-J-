<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pedido Já</title>
    
    <!-- Bibliotecas do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body>

    <!-- Área de Login -->
    <div id="formLogin">
        <div class="login-container">
            <h2>Login</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button type="button" id="btnEntrar">Entrar</button>
        </div>
    </div>

    <!-- Área do seu App (Pedido Já) -->
    <div id="meuApp" style="display: none;">
        <h1>Bem-vindo ao Pedido Já!</h1>
        <p>Seu sistema está pronto para uso.</p>
    </div>

    <!-- Conexão com o seu script -->
    <script src="script.js"></script>
</body>
</html>
