<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - PedidoJá</title>
</head>
<body>
    <div id="login-area" style="text-align: center; margin-top: 50px;">
        <h3>Acesso Restrito</h3>
        <input type="password" id="senhaAdmin" placeholder="Senha do Administrador">
        <button onclick="verificarSenha()">Entrar</button>
    </div>

    <div id="painel-admin" style="display: none; margin-top: 50px;">
        <h2>Gestão de Assinaturas</h2>
        <div id="lista-usuarios">Carregando usuários...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCO-wCiMGjrFwViCCzF4pdJU78lJVj4vE",
            authDomain: "root-engine-465612-t1.firebaseapp.com",
            projectId: "root-engine-465612-t1",
            storageBucket: "root-engine-465612-t1.firebasestorage.app",
            messagingSenderId: "796107955427",
            appId: "1:796107955427:web:f82b413f9a4e91c41239d6"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // SENHA DEFINIDA AQUI (Mude 'suaSenha123' para o que você quiser)
        const SENHA_CORRETA = "suaSenha125";

        window.verificarSenha = () => {
            const digitada = document.getElementById('senhaAdmin').value;
            if (digitada === SENHA_CORRETA) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('painel-admin').style.display = 'block';
                carregarUsuarios();
            } else {
                alert("Senha incorreta!");
            }
        };

        async function carregarUsuarios() {
            const querySnapshot = await getDocs(collection(db, "usuarios"));
            let html = "<ul>";
            querySnapshot.forEach((doc) => {
                const dados = doc.data();
                html += `<li>ID: ${doc.id} | Expira: ${dados.data_expiracao || 'Sem data'} 
                         <button onclick="renovar('${doc.id}')">Renovar 30 dias</button></li>`;
            });
            document.getElementById('lista-usuarios').innerHTML = html + "</ul>";
        }

        window.renovar = async (uid) => {
            let novaData = new Date();
            novaData.setDate(novaData.getDate() + 30);
            await updateDoc(doc(db, "usuarios", uid), { data_expiracao: novaData.toISOString().split('T')[0] });
            alert("Assinatura renovada!");
            carregarUsuarios();
        };
    </script>
</body>
</html>
